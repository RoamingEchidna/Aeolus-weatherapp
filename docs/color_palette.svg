  <!-- Footer note -->
  <text x="20" y="720" fill="#888" font-size="10">* Background colors are approximate. Material 3 generates exact values from seed #1565C0 via HCT color space at runtime.</text>
  <text x="20" y="735" fill="#888" font-size="10">* kColorPrecip and kColorWindChill share the same hex value (#0000CC).</text>

